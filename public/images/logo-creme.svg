  <line x1="27" y1="-105" x2="39" y2="-105" stroke="#C4A870" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(196, 168, 112);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="27" y1="-45" x2="39" y2="-45" stroke="#C4A870" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(196, 168, 112);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="27" y1="40" x2="39" y2="40" stroke="#C4A870" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(196, 168, 112);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="27" y1="90" x2="39" y2="90" stroke="#C4A870" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(196, 168, 112);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="27" y1="130" x2="39" y2="130" stroke="#C4A870" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(196, 168, 112);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>


