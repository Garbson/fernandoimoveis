<svg width="100%" viewBox="0 0 690 530" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo FP Elegante Creme</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Monograma FP elegante em tons creme e dourado com referências arquitetônicas sutis</desc>

<defs>
  <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F5E6C8"/>
    <stop offset="50%" stop-color="#E8D5AC"/>
    <stop offset="100%" stop-color="#D4BC8B"/>
  </linearGradient>
  <linearGradient id="creamLight" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F5E6C8"/>
    <stop offset="100%" stop-color="#E0CBA5"/>
  </linearGradient>
</defs>

<g transform="translate(340, 255)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

  <!-- ===== LETRA F ===== -->
  <!-- Haste vertical -->
  <rect fill="url(#cream)" x="-155" y="-165" width="16" height="330" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Serifa base -->
